spring.application.name=rest-api
server.port=8080

# Delay before moving QUEUED -> RUNNING, and RUNNING -> COMPLETED
job.processing.queued-delay-ms=2000
job.processing.running-delay-ms=3000

# Fail the first N processing attempts with a transient error, then succeed
# Only applies to jobs whose payload starts with "transient:"
job.processing.simulated-transient-failures=2
# Max processing attempts allowed before a transient failure becomes permanent
job.processing.max-retries=3
# Number of background worker threads consuming from the job queue
job.processing.worker-count=4
